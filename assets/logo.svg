<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Gold Gradient from Maven Music Network -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d3b65f"/>
      <stop offset="18%" style="stop-color:#f2df88"/>
      <stop offset="31%" style="stop-color:#d0ab4a"/>
      <stop offset="48%" style="stop-color:#b47a13"/>
      <stop offset="56%" style="stop-color:#fff4a7"/>
      <stop offset="64%" style="stop-color:#c79522"/>
      <stop offset="78%" style="stop-color:#ecd879"/>
      <stop offset="84%" style="stop-color:#fff5a9"/>
      <stop offset="93%" style="stop-color:#d0a432"/>
      <stop offset="100%" style="stop-color:#b87912"/>
    </linearGradient>
    
    <!-- Dark gradient for background -->
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" rx="15" fill="url(#darkGrad)"/>
  
  <!-- Decorative corner elements -->
  <path d="M 20 40 L 20 20 L 40 20" stroke="url(#goldGrad)" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 780 40 L 780 20 L 760 20" stroke="url(#goldGrad)" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 20 160 L 20 180 L 40 180" stroke="url(#goldGrad)" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 780 160 L 780 180 L 760 180" stroke="url(#goldGrad)" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Bundle Icon - Stacked boxes with golden accent -->
  <g transform="translate(60, 50)" filter="url(#shadow)">
    <!-- Bottom box -->
    <rect x="10" y="60" width="80" height="50" rx="4" fill="#1a1a1a" stroke="url(#goldGrad)" stroke-width="2"/>
    <rect x="20" y="70" width="60" height="4" rx="2" fill="url(#goldGrad)" opacity="0.8"/>
    <rect x="20" y="80" width="40" height="4" rx="2" fill="url(#goldGrad)" opacity="0.5"/>
    
    <!-- Middle box -->
    <rect x="25" y="30" width="80" height="50" rx="4" fill="#1a1a1a" stroke="url(#goldGrad)" stroke-width="2"/>
    <rect x="35" y="40" width="60" height="4" rx="2" fill="url(#goldGrad)" opacity="0.8"/>
    <rect x="35" y="50" width="40" height="4" rx="2" fill="url(#goldGrad)" opacity="0.5"/>
    
    <!-- Top box -->
    <rect x="40" y="0" width="80" height="50" rx="4" fill="#1a1a1a" stroke="url(#goldGrad)" stroke-width="2"/>
    <rect x="50" y="10" width="60" height="4" rx="2" fill="url(#goldGrad)" opacity="0.8"/>
    <rect x="50" y="20" width="40" height="4" rx="2" fill="url(#goldGrad)" opacity="0.5"/>
    
    <!-- Plus sign indicating bundle -->
    <circle cx="115" cy="85" r="18" fill="url(#goldGrad)" filter="url(#glow)"/>
    <path d="M 115 75 L 115 95 M 105 85 L 125 85" stroke="#0a0a0a" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Main Title -->
  <text x="240" y="85" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="800" fill="url(#goldGrad)" filter="url(#shadow)">OpenCart</text>
  <text x="240" y="135" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="800" fill="#ffffff" filter="url(#shadow)">Bundle System</text>
  
  <!-- Subtitle -->
  <text x="242" y="165" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#d3b65f" opacity="0.8" letter-spacing="3">PREMIUM E-COMMERCE SOLUTION</text>
  
  <!-- Right side decorative line -->
  <line x1="600" y1="100" x2="750" y2="100" stroke="url(#goldGrad)" stroke-width="2" opacity="0.3"/>
  <circle cx="750" cy="100" r="4" fill="url(#goldGrad)"/>
  
  <!-- Version badge -->
  <rect x="680" y="125" width="70" height="28" rx="14" fill="url(#goldGrad)" opacity="0.15" stroke="url(#goldGrad)" stroke-width="1"/>
  <text x="715" y="144" font-family="monospace" font-size="12" font-weight="600" fill="url(#goldGrad)" text-anchor="middle">v1.0.0</text>
</svg>