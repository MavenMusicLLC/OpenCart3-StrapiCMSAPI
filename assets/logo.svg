<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#d3b65f"/>
      <stop offset="18%"  stop-color="#f2df88"/>
      <stop offset="31%"  stop-color="#d0ab4a"/>
      <stop offset="48%"  stop-color="#b47a13"/>
      <stop offset="56%"  stop-color="#fff4a7"/>
      <stop offset="64%"  stop-color="#c79522"/>
      <stop offset="78%"  stop-color="#ecd879"/>
      <stop offset="84%"  stop-color="#fff5a9"/>
      <stop offset="93%"  stop-color="#d0a432"/>
      <stop offset="100%" stop-color="#b87912"/>
    </linearGradient>
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#d3b65f" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#d3b65f" stop-opacity="0.6"/>
      <stop offset="80%"  stop-color="#d3b65f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#d3b65f" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" rx="12" fill="url(#bg)"/>

  <!-- Top gold border line -->
  <rect x="0" y="0" width="860" height="2" rx="1" fill="url(#goldBorder)"/>
  <!-- Bottom gold border line -->
  <rect x="0" y="198" width="860" height="2" rx="1" fill="url(#goldBorder)"/>

  <!-- Corner brackets -->
  <path d="M24 44 L24 20 L48 20" stroke="#d3b65f" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M836 44 L836 20 L812 20" stroke="#d3b65f" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M24 156 L24 180 L48 180" stroke="#d3b65f" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M836 156 L836 180 L812 180" stroke="#d3b65f" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Stacked box icon -->
  <g transform="translate(52, 46)" filter="url(#textShadow)">
    <rect x="12" y="64" width="76" height="44" rx="5" fill="#1c1c1c" stroke="url(#gold)" stroke-width="1.5"/>
    <rect x="22" y="75"  width="56" height="4" rx="2" fill="url(#gold)" opacity="0.75"/>
    <rect x="22" y="85"  width="38" height="4" rx="2" fill="url(#gold)" opacity="0.4"/>
    <rect x="24" y="34" width="76" height="44" rx="5" fill="#1c1c1c" stroke="url(#gold)" stroke-width="1.5"/>
    <rect x="34" y="45"  width="56" height="4" rx="2" fill="url(#gold)" opacity="0.75"/>
    <rect x="34" y="55"  width="38" height="4" rx="2" fill="url(#gold)" opacity="0.4"/>
    <rect x="36" y="4"  width="76" height="44" rx="5" fill="#1c1c1c" stroke="url(#gold)" stroke-width="1.5"/>
    <rect x="46" y="15"  width="56" height="4" rx="2" fill="url(#gold)" opacity="0.75"/>
    <rect x="46" y="25"  width="38" height="4" rx="2" fill="url(#gold)" opacity="0.4"/>
    <!-- Plus badge -->
    <circle cx="113" cy="88" r="16" fill="url(#gold)" filter="url(#glow)"/>
    <path d="M113 80 L113 96 M105 88 L121 88" stroke="#0a0a0a" stroke-width="2.8" stroke-linecap="round"/>
  </g>

  <!-- Main title -->
  <text x="215" y="88"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="46" font-weight="800" letter-spacing="-1"
        fill="url(#gold)" filter="url(#textShadow)">OpenCart</text>
  <text x="215" y="140"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="46" font-weight="800" letter-spacing="-1"
        fill="#ffffff" filter="url(#textShadow)">Bundle System</text>

  <!-- Tagline -->
  <text x="217" y="168"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="13" font-weight="400" letter-spacing="4"
        fill="#d3b65f" opacity="0.7">PREMIUM E-COMMERCE SOLUTION</text>

  <!-- Right divider + Strapi badge -->
  <line x1="620" y1="70" x2="820" y2="70" stroke="url(#gold)" stroke-width="0.5" opacity="0.3"/>
  <text x="620" y="105"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="11" font-weight="400" letter-spacing="3"
        fill="#888">POWERED BY</text>
  <text x="620" y="130"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="700" letter-spacing="1"
        fill="#ffffff" opacity="0.9">Strapi CMS</text>
  <text x="620" y="152"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="11" font-weight="400" letter-spacing="2"
        fill="#666">REST + GraphQL API</text>
  <line x1="620" y1="162" x2="820" y2="162" stroke="url(#gold)" stroke-width="0.5" opacity="0.3"/>

  <!-- Version pill -->
  <rect x="728" y="172" width="68" height="22" rx="11"
        fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <text x="762" y="187"
        font-family="monospace" font-size="11" font-weight="600"
        fill="url(#gold)" text-anchor="middle" opacity="0.8">v 1.0.0</text>
</svg>