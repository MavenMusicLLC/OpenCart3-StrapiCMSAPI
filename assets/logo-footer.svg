<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 56">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#d3b65f"/>
      <stop offset="18%"  stop-color="#f2df88"/>
      <stop offset="31%"  stop-color="#d0ab4a"/>
      <stop offset="48%"  stop-color="#b47a13"/>
      <stop offset="56%"  stop-color="#fff4a7"/>
      <stop offset="64%"  stop-color="#c79522"/>
      <stop offset="78%"  stop-color="#ecd879"/>
      <stop offset="100%" stop-color="#b87912"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#d3b65f" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#d3b65f" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d3b65f" stop-opacity="0"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="260" height="56" rx="7" fill="#0a0a0a"/>
  <rect x="0" y="0" width="260" height="1" fill="url(#border)"/>
  <rect x="0" y="55" width="260" height="1" fill="url(#border)"/>

  <!-- Stacked boxes icon (scaled down) -->
  <g transform="translate(10, 8)">
    <rect x="4"  y="22" width="28" height="18" rx="3" fill="#1a1a1a" stroke="url(#gold)" stroke-width="1.2"/>
    <rect x="8"  y="26" width="20" height="2.5" rx="1.2" fill="url(#gold)" opacity="0.7"/>
    <rect x="8"  y="31" width="13" height="2.5" rx="1.2" fill="url(#gold)" opacity="0.4"/>
    <rect x="8"  y="11" width="28" height="18" rx="3" fill="#1a1a1a" stroke="url(#gold)" stroke-width="1.2"/>
    <rect x="12" y="15" width="20" height="2.5" rx="1.2" fill="url(#gold)" opacity="0.7"/>
    <rect x="12" y="20" width="13" height="2.5" rx="1.2" fill="url(#gold)" opacity="0.4"/>
    <rect x="12" y="0"  width="28" height="18" rx="3" fill="#1a1a1a" stroke="url(#gold)" stroke-width="1.2"/>
    <rect x="16" y="4"  width="20" height="2.5" rx="1.2" fill="url(#gold)" opacity="0.7"/>
    <rect x="16" y="9"  width="13" height="2.5" rx="1.2" fill="url(#gold)" opacity="0.4"/>
    <!-- Plus badge -->
    <circle cx="42" cy="31" r="9" fill="url(#gold)" filter="url(#gl)"/>
    <path d="M42 26 L42 36 M37 31 L47 31" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Text block -->
  <text x="68" y="23"
        font-family="'Maven Pro','Segoe UI',sans-serif"
        font-size="14" font-weight="700" letter-spacing="1.5"
        fill="url(#gold)">MAVEN MUSIC</text>
  <text x="68" y="37"
        font-family="'Maven Pro','Segoe UI',sans-serif"
        font-size="8" font-weight="400" letter-spacing="3"
        fill="#777">OPENCART BUNDLE SYSTEM</text>
  <line x1="68" y1="42" x2="248" y2="42" stroke="url(#border)" stroke-width="0.5"/>
  <text x="68" y="51"
        font-family="'Maven Pro','Segoe UI',sans-serif"
        font-size="7" font-weight="400" letter-spacing="1.5"
        fill="#444">mavenmusic.network</text>
</svg>